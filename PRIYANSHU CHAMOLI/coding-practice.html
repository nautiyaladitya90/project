<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Practice - EduPortal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/code-editor.css">
    <!-- Pyodide CDN -->
    <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
</head>
<body>
    <nav class="navbar glass">
        <div class="container nav-container" style="max-width: 100%; padding: 0 40px;">
            <a href="index.html" class="logo">
                <i class="fas fa-graduation-cap" style="color: var(--primary);"></i>
                <span>EduPortal</span>
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="notes-first-year.html">Notes</a></li>
                <li><a href="coding-practice.html" class="active">Coding Practice</a></li>
                <li id="auth-buttons" class="auth-buttons"></li>
            </ul>
        </div>
    </nav>

    <div class="container" style="max-width: 100%; padding: 20px;">
        <div class="editor-container">
            <div class="editor-header">
                <div class="editor-tabs" id="lang-tabs">
                    <button class="editor-tab active" data-lang="web">HTML/CSS/JS</button>
                    <button class="editor-tab" data-lang="python">Python 3</button>
                    <button class="editor-tab" data-lang="c">C Programming</button>
                </div>
                <div class="editor-actions">
                    <button class="btn btn-outline" id="clear-btn" style="padding: 6px 15px; font-size: 0.9rem; margin-right: 10px;">Clear</button>
                    <button class="btn btn-primary" id="run-btn" style="padding: 6px 15px; font-size: 0.9rem;">
                        <i class="fas fa-play"></i> Run Code
                    </button>
                </div>
            </div>

            <div class="editor-main">
                <!-- Web Editor (HTML) -->
                <div class="editor-panels" id="editor-web">
                    <div style="background:#2D2D2D; color:#fff; padding: 2px 10px; font-size: 12px; display:flex; justify-content:space-between; align-items:center;">
                        <span>index.html (Include CSS in &lt;style&gt; and JS in &lt;script&gt;)</span>
                    </div>
                    <div id="html-code-container" class="editor-textarea" style="flex: 1;"></div>
                </div>

                <!-- Python Editor -->
                <div class="editor-panels" id="editor-python" style="display: none;">
                    <div style="background:#2D2D2D; color:#fff; padding: 2px 10px; font-size: 12px;">Python (Powered by Pyodide)</div>
                    <div id="py-code-container" class="editor-textarea" style="flex: 1;"></div>
                </div>

                <!-- C Editor -->
                <div class="editor-panels" id="editor-c" style="display: none;">
                    <div style="background:#2D2D2D; color:#fff; padding: 2px 10px; font-size: 12px;">main.c</div>
                    <div id="c-code-container" class="editor-textarea" style="flex: 1;"></div>
                </div>

                <!-- Output Panel -->
                <div class="output-panel">
                    <div class="output-header">
                        <span>Output Preview</span>
                    </div>
                    
                    <!-- For Web -->
                    <iframe id="output-frame" class="output-frame"></iframe>
                    
                    <!-- For Python / C Console -->
                    <pre id="output-console" class="output-console" style="display: none;">Ready...</pre>
                </div>
            </div>
        </div>
    </div>

    <!-- Monaco Editor Loader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.41.0/min/vs/loader.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/editor.js"></script>
</body>
</html>
