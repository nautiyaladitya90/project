<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Year Notes - EduPortal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
</head>
<body>
    <nav class="navbar glass">
        <!-- same nav... -->
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-graduation-cap" style="color: var(--primary);"></i>
                <span>EduPortal</span>
            </a>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="notes-first-year.html" class="active">Notes</a></li>
                <li><a href="coding-practice.html">Coding Practice</a></li>
                <li><a href="important-questions.html">Questions</a></li>
                <li id="auth-buttons" class="auth-buttons"></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding: 40px 20px;">
        <h2 style="margin-bottom: 30px; text-align: center; color: var(--primary);">Second Year Subjects</h2>

        <div class="tabs" style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
            <button class="btn btn-primary" id="btn-sem3" onclick="switchSem('sem3')">Semester 3</button>
            <button class="btn btn-outline" id="btn-sem4" onclick="switchSem('sem4')">Semester 4</button>
        </div>

        <div id="sem3-content" class="subject-grid">
            <!-- Populated by JS -->
        </div>

        <div id="sem4-content" class="subject-grid" style="display: none;">
            <!-- Populated by JS -->
        </div>
    </main>

    <style>
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
    </style>

    <script>
        function switchSem(sem) {
            document.getElementById('sem3-content').style.display = sem === 'sem3' ? 'grid' : 'none';
            document.getElementById('sem4-content').style.display = sem === 'sem4' ? 'grid' : 'none';
            document.getElementById('btn-sem3').className = sem === 'sem3' ? 'btn btn-primary' : 'btn btn-outline';
            document.getElementById('btn-sem4').className = sem === 'sem4' ? 'btn btn-primary' : 'btn btn-outline';
        }

        async function loadSubjects() {
            try {
                const res = await fetch('api/subjects.php');
                const subjects = await res.json();
                
                const sem3Grid = document.getElementById('sem3-content');
                const sem4Grid = document.getElementById('sem4-content');
                sem3Grid.innerHTML = '';
                sem4Grid.innerHTML = '';

                subjects.forEach(sub => {
                    const card = `
                        <div class="glass glass-card" style="padding: 25px; display: flex; flex-direction: column; align-items: center; text-align: center;">
                            <i class="fas fa-book-open" style="font-size: 2.5rem; color: var(--primary); margin-bottom: 15px;"></i>
                            <h3 style="margin-bottom: 15px;">${sub.title}</h3>
                            <a href="subject-detail.html?subject=${encodeURIComponent(sub.title)}" class="btn btn-outline" style="width: 100%; margin-top: auto;">Open Subject</a>
                        </div>
                    `;
                    if (sub.year_sem === 'Year 2, Sem 3') {
                        sem3Grid.innerHTML += card;
                    } else if (sub.year_sem === 'Year 2, Sem 4') {
                        sem4Grid.innerHTML += card;
                    }
                });
            } catch (err) {
                console.error('Failed to load subjects', err);
            }
        }
        document.addEventListener('DOMContentLoaded', loadSubjects);
    </script>

    <script src="js/main.js"></script>
</body>
</html>
